<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#1a1208"/>
  <!-- Dino head -->
  <circle cx="13" cy="13" r="8" fill="#4ade80"/>
  <!-- Snout -->
  <ellipse cx="18.5" cy="15" rx="4" ry="3" fill="#34d46a"/>
  <!-- Eye -->
  <circle cx="14.5" cy="11" r="2.5" fill="#fff"/>
  <circle cx="15.2" cy="10.7" r="1.4" fill="#1a1208"/>
  <circle cx="15.7" cy="10.3" r="0.5" fill="#fff"/>
  <!-- Smile -->
  <path d="M17 16.5 Q19 15 20.5 15.8" fill="none" stroke="#1a3a2a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Spikes -->
  <path d="M7 9 L5 5 L9 8.5 L7 4 L10 7.5" fill="#facc15"/>
  <!-- Guitar body (small) -->
  <ellipse cx="22" cy="22" rx="5" ry="4" fill="#fb923c"/>
  <ellipse cx="22" cy="25" rx="5.5" ry="4.5" fill="#ea580c"/>
  <circle cx="22" cy="23" r="1.8" fill="#7c2d12"/>
  <!-- Guitar neck -->
  <rect x="20.5" y="14" width="2.5" height="9" rx="1" fill="#92400e"/>
  <!-- Headstock -->
  <rect x="19.5" y="12" width="4.5" height="3" rx="1.5" fill="#7c2d12"/>
</svg>
