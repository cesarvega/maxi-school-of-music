<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#1a1208"/>
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="url(#bg)" stroke-width="1.5" opacity="0.4"/>
  <!-- Dino body -->
  <ellipse cx="13" cy="19" rx="5.5" ry="4.5" fill="#4ade80"/>
  <!-- Dino head -->
  <circle cx="17.5" cy="14" r="3.5" fill="#4ade80"/>
  <!-- Dino eye -->
  <circle cx="18.5" cy="13.2" r="1" fill="#1a1208"/>
  <circle cx="18.8" cy="12.9" r="0.35" fill="#fff"/>
  <!-- Dino mouth -->
  <path d="M19.5 15.5 Q20.5 14.8 21 15.2" fill="none" stroke="#1a1208" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Dino spikes -->
  <path d="M10 15 L8.5 12 L11 14 L9.5 11 L12 13.5" fill="#facc15" stroke="#facc15" stroke-width="0.4" stroke-linejoin="round"/>
  <!-- Dino tail -->
  <path d="M7.5 19 Q5 17 4 19" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dino legs -->
  <rect x="10.5" y="22" width="2" height="3" rx="1" fill="#22c55e"/>
  <rect x="14.5" y="22" width="2" height="3" rx="1" fill="#22c55e"/>
  <!-- Music note -->
  <g transform="translate(21, 7)">
    <ellipse cx="0" cy="4.5" rx="2" ry="1.5" fill="#fb923c" transform="rotate(-20, 0, 4.5)"/>
    <rect x="1.3" y="-2" width="1.2" height="6.5" rx="0.6" fill="#fb923c"/>
    <path d="M2.5 -2 Q5 -1 5 1.5 Q5 3 3.5 2" fill="#facc15" opacity="0.8"/>
  </g>
</svg>
