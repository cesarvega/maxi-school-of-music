<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#2a1f10"/>
    </linearGradient>
    <linearGradient id="dino" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ce88a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="guitar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="5" y="5" width="502" height="502" rx="107" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.2"/>

  <!-- Sparkle particles -->
  <circle cx="70" cy="75" r="4" fill="#fb923c" opacity="0.5"/>
  <circle cx="440" cy="60" r="3" fill="#facc15" opacity="0.45"/>
  <circle cx="55" cy="420" r="3.5" fill="#4ade80" opacity="0.4"/>
  <circle cx="455" cy="440" r="4" fill="#fb923c" opacity="0.35"/>
  <circle cx="420" cy="160" r="2.5" fill="#facc15" opacity="0.5"/>
  <circle cx="90" cy="180" r="2" fill="#4ade80" opacity="0.4"/>

  <!-- Floating music notes -->
  <g filter="url(#glow)" opacity="0.7">
    <text x="80" y="130" font-family="serif" font-size="40" fill="#fb923c" transform="rotate(-15,80,130)">&#9835;</text>
    <text x="410" y="110" font-family="serif" font-size="32" fill="#facc15" transform="rotate(12,410,110)">&#9834;</text>
    <text x="430" y="370" font-family="serif" font-size="36" fill="#4ade80" transform="rotate(-8,430,370)">&#9833;</text>
    <text x="65" y="340" font-family="serif" font-size="28" fill="#facc15" transform="rotate(10,65,340)">&#9834;</text>
  </g>

  <!-- DINO WITH GUITAR — main illustration -->
  <g filter="url(#s)" transform="translate(256, 245)">
    <!-- Tail -->
    <path d="M-90 40 Q-140 10 -155 45 Q-165 65 -140 70" fill="none" stroke="url(#dino)" stroke-width="32" stroke-linecap="round"/>
    <!-- Tail spikes -->
    <path d="M-145 55 L-170 35 L-148 60 L-175 55 L-145 68" fill="#facc15"/>

    <!-- Body -->
    <ellipse cx="-10" cy="50" rx="85" ry="65" fill="url(#dino)"/>
    <!-- Belly highlight -->
    <ellipse cx="-5" cy="65" rx="55" ry="35" fill="#86efac" opacity="0.3"/>

    <!-- Legs -->
    <rect x="-42" y="105" width="26" height="45" rx="13" fill="#16a34a"/>
    <rect x="10" y="105" width="26" height="45" rx="13" fill="#16a34a"/>
    <ellipse cx="-29" cy="150" rx="18" ry="7" fill="#15803d"/>
    <ellipse cx="23" cy="150" rx="18" ry="7" fill="#15803d"/>

    <!-- GUITAR (dino is holding it!) -->
    <g transform="translate(20, 10) rotate(-15)">
      <!-- Guitar neck -->
      <rect x="-6" y="-100" width="12" height="95" rx="4" fill="#92400e"/>
      <!-- Frets -->
      <line x1="-4" y1="-80" x2="4" y2="-80" stroke="#fbbf24" stroke-width="1.5"/>
      <line x1="-4" y1="-65" x2="4" y2="-65" stroke="#fbbf24" stroke-width="1.5"/>
      <line x1="-4" y1="-50" x2="4" y2="-50" stroke="#fbbf24" stroke-width="1.5"/>
      <line x1="-4" y1="-35" x2="4" y2="-35" stroke="#fbbf24" stroke-width="1.5"/>
      <!-- Guitar headstock -->
      <rect x="-10" y="-118" width="20" height="22" rx="6" fill="#7c2d12"/>
      <!-- Tuning pegs -->
      <circle cx="-7" cy="-112" r="3" fill="#fbbf24"/>
      <circle cx="7" cy="-112" r="3" fill="#fbbf24"/>
      <circle cx="-7" cy="-102" r="3" fill="#fbbf24"/>
      <circle cx="7" cy="-102" r="3" fill="#fbbf24"/>
      <!-- Guitar body -->
      <ellipse cx="0" cy="15" rx="35" ry="28" fill="url(#guitar)"/>
      <ellipse cx="0" cy="38" rx="40" ry="32" fill="url(#guitar)"/>
      <!-- Sound hole -->
      <circle cx="0" cy="25" r="12" fill="#7c2d12"/>
      <circle cx="0" cy="25" r="10" fill="#5c1d0a" opacity="0.6"/>
      <!-- Bridge -->
      <rect x="-12" y="45" width="24" height="4" rx="2" fill="#7c2d12"/>
      <!-- Strings -->
      <line x1="-3" y1="-95" x2="-3" y2="45" stroke="#fde68a" stroke-width="0.8" opacity="0.7"/>
      <line x1="0" y1="-95" x2="0" y2="45" stroke="#fde68a" stroke-width="1" opacity="0.8"/>
      <line x1="3" y1="-95" x2="3" y2="45" stroke="#fde68a" stroke-width="0.8" opacity="0.7"/>
      <!-- Guitar shine -->
      <ellipse cx="-12" cy="10" rx="8" ry="14" fill="#fff" opacity="0.08" transform="rotate(-20,-12,10)"/>
    </g>

    <!-- Left arm (holding guitar neck) -->
    <path d="M-40 20 Q-10 -15 15 -10" fill="none" stroke="#22c55e" stroke-width="16" stroke-linecap="round"/>
    <!-- Left hand on neck -->
    <circle cx="14" cy="-10" r="9" fill="#34d46a"/>

    <!-- Right arm (strumming) -->
    <path d="M40 25 Q55 45 42 60" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
    <!-- Right hand near sound hole -->
    <circle cx="42" cy="58" r="8" fill="#34d46a"/>

    <!-- Back spikes -->
    <path d="M-65 5 L-85 -40 L-55 10" fill="#facc15"/>
    <path d="M-50 -8 L-65 -50 L-40 -2" fill="#fbbf24"/>
    <path d="M-35 -18 L-42 -60 L-25 -15" fill="#facc15"/>

    <!-- Head -->
    <circle cx="50" cy="-50" r="52" fill="url(#dino)"/>
    <!-- Snout -->
    <ellipse cx="88" cy="-38" rx="28" ry="20" fill="#34d46a"/>
    <!-- Eye white -->
    <circle cx="68" cy="-62" r="16" fill="#fff"/>
    <!-- Pupil -->
    <circle cx="72" cy="-63" r="9" fill="#1a1208"/>
    <!-- Eye shine -->
    <circle cx="75" cy="-66" r="3.5" fill="#fff"/>
    <!-- Big happy smile -->
    <path d="M78 -32 Q95 -22 105 -30" fill="none" stroke="#1a3a2a" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Open mouth smile -->
    <path d="M82 -28 Q92 -18 102 -25" fill="#15803d" opacity="0.5"/>
    <!-- Teeth -->
    <path d="M85 -28 L87 -22 L89 -28" fill="#fff" opacity="0.7"/>
    <path d="M93 -26 L95 -20 L97 -26" fill="#fff" opacity="0.7"/>
    <!-- Nostril -->
    <circle cx="102" cy="-42" r="3" fill="#1a3a2a" opacity="0.35"/>
    <!-- Cheek blush -->
    <ellipse cx="82" cy="-25" rx="8" ry="5" fill="#f472b6" opacity="0.2"/>
  </g>
</svg>
